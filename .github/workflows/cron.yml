# Background engine pinger — drains the broadcast queue, fires scheduled
# campaigns, auto-sends, API-rule sends, flow no-reply reminders, and
# fallback AI replies by POSTing the portal's cron endpoint.
#
# Setup (repo → Settings → Secrets and variables → Actions):
#   secret  CRON_SECRET  — must equal the portal's CRON_SECRET env var
#   variable CRON_URL    — optional override; defaults to the production URL
#
# Note: GitHub schedules have a 5-minute minimum and may lag a few minutes.
# All cron work is idempotent (atomic claims), so delays/overlaps are safe.
# If 1-minute precision is ever needed (e.g. tight flow reminders), point
# cron-job.org at the same endpoint — both can run simultaneously.

name: cron-process-queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}     # manual "Run workflow" button for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Drain queue
        env:
          # No default — this is the SaaS; set CRON_URL to YOUR deployment so we
          # never accidentally ping the internal app.
          URL: ${{ vars.CRON_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set (Settings → Secrets and variables → Actions)"
            exit 1
          fi
          if [ -z "$URL" ]; then
            echo "::error::CRON_URL repo variable is not set — point it at https://<your-saas-domain>/api/cron/process-queue (Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -m 55 --retry 2 --retry-delay 5 \
            -X POST "$URL" -H "Authorization: Bearer $SECRET")
          echo "HTTP $code"
          cat /tmp/resp.json
          [ "$code" = "200" ] || { echo "::error::cron endpoint returned $code"; exit 1; }
